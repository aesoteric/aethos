name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  # The product ships as cgo-free static binaries for four platforms;
  # cross-compiling all of them keeps that guarantee from regressing.
  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (static, cgo-free)
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  release-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify archives and checksums
        run: go run ./scripts/verify-release-artifacts.go dist
      - name: Verify one-volume container invocation
        shell: bash
        run: |
          image="$(docker image ls ghcr.io/aesoteric/aethos --format '{{.Repository}}:{{.Tag}}' | awk '/-amd64$/ { print; exit }')"
          test -n "$image"
          container_data="${RUNNER_TEMP}/aethos-container"
          mkdir -p "$container_data/aethos" "$container_data/home" "$container_data/workspace"
          docker_args=(
            --rm
            --user "$(id -u):$(id -g)"
            --mount "type=bind,src=$container_data,dst=/data"
          )
          output="$(docker run "${docker_args[@]}" "$image" version)"
          grep -Eq '^aethos [^ ]+ \(commit [^,]+, built [^)]+\)$' <<<"$output"
          ! grep -Fq 'aethos dev ' <<<"$output"
          docker run "${docker_args[@]}" "$image" agents install opencode
          test -s "$container_data/aethos/agents.json"
          test -x "$container_data/aethos/agents/opencode/opencode"
          docker run "${docker_args[@]}" \
            --entrypoint /data/aethos/agents/opencode/opencode \
            "$image" --version
      - name: Verify systemd unit
        shell: bash
        run: |
          binary="$(jq -r '.[] | select(.type == "Binary" and .goos == "linux" and .goarch == "amd64") | .path' dist/artifacts.json)"
          test -f "$binary"
          sudo useradd --system --home-dir /var/lib/aethos --shell /usr/sbin/nologin aethos
          sudo install -m 0755 "$binary" /usr/local/bin/aethos
          sudo install -d -o aethos -g aethos -m 0700 \
            /var/lib/aethos /var/lib/aethos/data /var/lib/aethos/home /var/lib/aethos/workspace
          systemd-analyze verify deploy/systemd/aethos.service
