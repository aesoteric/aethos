# Directory made available to Sessions by default.
workspace = "/srv/aethos-workspace"

# Command used to start the default Agent.
default_agent = "npx @zed-industries/claude-code-acp"

# Time with no Prompt work before a live Session becomes dormant.
idle_timeout = "45m"

[rest]
listen_address = "127.0.0.1:9090"
bearer_token = "file-rest-token"

# Token used by the Telegram Channel.
[telegram]
bot_token = "file-token"
chat_id = -1001234567890
allowed_user_ids = [123456789, 987654321]
